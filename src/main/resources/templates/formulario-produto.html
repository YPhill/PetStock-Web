<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Produto - PetStock</title>

<!-- CSS global -->
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/header.css">
<link rel="stylesheet" href="/css/formularios.css">
</head>

<body>

	<!-- Cabeçalho padrão -->
	<div th:replace="~{fragments/header :: header}"></div>

	<main class="conteudo">

		<h1>Cadastrar Produto</h1>

		<!-- Formulário -->
		<form th:action="@{/produtos/salvar}" th:object="${produto}" method="post">

			<!-- ID escondido usado na edição -->
			<input type="hidden" th:field="*{idProduto}">

			<!-- Divisão do formulário em duas colunas -->
			<div class="grid-formulario">

				<!-- Nome do produto -->
				<div>
					<label>Nome:</label>

					<input type="text"
						th:field="*{nome}"
						placeholder="Digite o nome do produto"
						required>
				</div>

				<!-- Categoria do produto -->
				<div>
					<label>Categoria:</label>

					<input type="text"
						th:field="*{categoria}"
						placeholder="Digite a categoria"
						required>
				</div>

				<!-- Preço do produto -->
				<div>
					<label>Preço:</label>

					<input type="number"
						step="0.01"
						min="0.01"
						th:field="*{preco}"
						placeholder="Digite o preço"
						required>
				</div>

				<!-- Marca do produto -->
				<div>
					<label>Marca:</label>

					<input type="text"
						th:field="*{marca}"
						placeholder="Digite a marca"
						required>
				</div>

				<!-- Validade do produto -->
				<div>
					<label>Validade:</label>

					<input type="date"
						th:field="*{validade}"
						required>
				</div>

				<!-- Fornecedor vinculado ao produto -->
				<div>
					<label>Fornecedor:</label>

					<select th:field="*{fornecedor.idFornecedor}" required>

						<option value="0">Selecione um fornecedor</option>

						<option th:each="fornecedor : ${fornecedores}"
							th:value="${fornecedor.idFornecedor}"
							th:text="${fornecedor.nomeFantasia}">
						</option>

					</select>
				</div>

			</div>

			<!-- Botões -->
			<div class="grupo-botoes">

				<button type="button"
					class="btn-voltar"
					onclick="window.location.href='/produtos'">

					Voltar

				</button>

				<button type="submit">
					Salvar Produto
				</button>

			</div>

		</form>

	</main>

</body>

</html>
