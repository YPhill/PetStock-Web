<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Produto - PetStock</title>

<!-- CSS global -->
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/header.css">
<link rel="stylesheet" href="/css/formularios.css">
</head>

<body>

	<!-- Cabeçalho padrão -->
	<div th:replace="~{fragments/header :: header}"></div>

	<main class="conteudo">
		<p th:if="${erro}" th:text="${erro}" class="mensagem-erro"></p>

		<h1>Cadastrar Produto</h1>

		<!-- Formulário -->
		<form th:action="@{/produtos/salvar}" th:object="${produto}"
			method="post">

			<!-- ID escondido usado na edição -->
			<input type="hidden" th:field="*{idProduto}">

			<!-- Divisão do formulário em duas colunas -->
			<div class="grid-formulario">

				<!-- Nome do produto -->
				<div>
					<label>Nome:</label> <input type="text" th:field="*{nome}"
						placeholder="Digite o nome do produto" required>
				</div>

				<!-- Categoria do produto -->
				<div>
					<label>Categoria:</label> <select th:field="*{categoria}">
						<option value="">Selecione uma categoria</option>
						<option value="Ração">Ração</option>
						<option value="Medicamento">Medicamento</option>
						<option value="Brinquedo">Brinquedo</option>
						<option value="Higiene">Higiene</option>
						<option value="Acessório">Acessório</option>
						<option value="Areia">Areia</option>
						<option value="Petisco">Petisco</option>
					</select>
				</div>

				<!-- Preço do produto -->
				<div>
					<label>Preço:</label> <input type="number" step="0.01" min="0.01"
						th:field="*{preco}" placeholder="Digite o preço" required>
				</div>

				<!-- Marca do produto -->
				<div>
					<label>Marca:</label> <select th:field="*{marca}" required>

						<option value="">Selecione uma marca</option>

						<optgroup label="Rações">
							<option value="Royal Canin">Royal Canin</option>
							<option value="Premier Pet">Premier Pet</option>
							<option value="Golden">Golden</option>
							<option value="Pedigree">Pedigree</option>
							<option value="Whiskas">Whiskas</option>
							<option value="GranPlus">GranPlus</option>
							<option value="Fórmula Natural">Fórmula Natural</option>
							<option value="Special Dog">Special Dog</option>
						</optgroup>

						<optgroup label="Medicamentos e Saúde">
							<option value="Agener União">Agener União</option>
							<option value="Ourofino">Ourofino</option>
							<option value="Zoetis">Zoetis</option>
							<option value="MSD Saúde Animal">MSD Saúde Animal</option>
							<option value="Ceva">Ceva</option>
							<option value="Elanco">Elanco</option>
							<option value="Vetnil">Vetnil</option>
						</optgroup>

						<optgroup label="Brinquedos">
							<option value="Kong">Kong</option>
							<option value="Pet Games">Pet Games</option>
							<option value="Chalesco">Chalesco</option>
							<option value="Jambo Pet">Jambo Pet</option>
							<option value="Furacão Pet">Furacão Pet</option>
							<option value="São Pet">São Pet</option>
							<option value="Ferplast">Ferplast</option>
							<option value="Zee.Dog">Zee.Dog</option>
						</optgroup>

						<optgroup label="Higiene e Limpeza">
							<option value="Pet Society">Pet Society</option>
							<option value="Sanol Dog">Sanol Dog</option>
							<option value="Kelco">Kelco</option>
							<option value="Ibasa">Ibasa</option>
							<option value="Procão">Procão</option>
							<option value="Pipi Dog">Pipi Dog</option>
						</optgroup>

						<optgroup label="Areia e Sanitários">
							<option value="Pipicat">Pipicat</option>
							<option value="Katbom">Katbom</option>
							<option value="Viva Verde">Viva Verde</option>
							<option value="Meau">Meau</option>
						</optgroup>

						<optgroup label="Petiscos">
							<option value="Dreamies">Dreamies</option>
							<option value="Pedigree Dentastix">Pedigree Dentastix</option>
							<option value="Bifinho Keldog">Bifinho Keldog</option>
							<option value="Snack Cães">Snack Cães</option>
						</optgroup>

					</select>
				</div>

				<!-- Validade do produto -->
				<div>
					<label>Validade:</label> <input type="date" th:field="*{validade}"
						required>
				</div>

				<!-- Fornecedor vinculado ao produto -->
				<div>
					<label>Fornecedor:</label> <select
						th:field="*{fornecedor.idFornecedor}" required>

						<option value="0">Selecione um fornecedor</option>

						<option th:each="fornecedor : ${fornecedores}"
							th:value="${fornecedor.idFornecedor}"
							th:text="${fornecedor.nomeFantasia}"></option>

					</select>
				</div>

			</div>

			<!-- Botões -->
			<div class="grupo-botoes">

				<button type="button" class="btn-voltar"
					onclick="window.location.href='/produtos'">Voltar</button>

				<button type="submit">Salvar Produto</button>

			</div>

		</form>

	</main>

</body>

</html>
