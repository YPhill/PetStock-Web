<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Produtos - PetStock</title>
</head>

<body>

    <h1>Produtos</h1>

    <a href="/">Voltar para início</a>

    <hr>

    <table border="1">

        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Categoria</th>
                <th>Marca</th>
                <th>Preço</th>
                <th>Estoque</th>
                <th>Fornecedor</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="produto : ${produtos}">

                <td th:text="${produto.idProduto}"></td>

                <td th:text="${produto.nome}"></td>

                <td th:text="${produto.categoria != null ? produto.categoria : '-'}"></td>

                <td th:text="${produto.marca != null ? produto.marca : '-'}"></td>

                <td th:text="${produto.preco}"></td>

                <td th:text="${produto.estoque != null ? produto.estoque.quantidadeAtual : '-'}"></td>

                <td th:text="${produto.fornecedor != null ? produto.fornecedor.nomeFantasia : '-'}"></td>

            </tr>

        </tbody>

    </table>

</body>

</html>
