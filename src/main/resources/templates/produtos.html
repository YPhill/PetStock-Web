<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
<!-- Importa o CSS principal do sistema -->
<link rel="stylesheet" href="/css/style.css">
<meta charset="UTF-8">
<title>Produtos - PetStock</title>
</head>

<body>
	<!-- Insere o cabeçalho padrão -->
	<div th:replace="~{fragments/header :: header}"></div>

	<!-- Conteúdo principal da página -->
	<main class="conteudo">

		<h1>Produtos</h1>

		<!-- Botões principais do CRUD de produtos -->
		<div>
			<a href="/produtos/novo">
				<button type="button">Cadastrar</button>
			</a>

			<button type="button" onclick="ativarModoEditar()">Editar</button>

			<button type="button" onclick="ativarModoExcluir()">Excluir</button>

			<button type="button" id="btnConfirmar" onclick="confirmarAcao()"
				style="display: none;">Confirmar</button>

			<button type="button" id="btnCancelar" onclick="cancelarSelecao()"
				style="display: none;">Cancelar</button>
		</div>

		<!-- Mensagem de erro, usada quando não for possível excluir -->
		<p th:if="${erro}" th:text="${erro}" style="color: red;"></p>

		<!-- Campo de pesquisa em tempo real -->
		<div>
			<label>Pesquisar produto:</label> <br> <input type="text"
				id="campoPesquisa" placeholder="Digite o nome do produto">
		</div>


		<hr>

		<!-- Formulário usado para editar/excluir produtos selecionados -->
		<form id="formSelecao" method="post">

			<table border="1">

				<thead>
					<tr>
						<th class="coluna-selecao" style="display: none;">Selecionar</th>
						<th>ID</th>
						<th>Nome</th>
						<th>Categoria</th>
						<th>Marca</th>
						<th>Preço</th>
						<th>Fornecedor</th>
					</tr>
				</thead>

				<tbody>

					<tr th:each="produto : ${produtos}" class="linha-produto">

						<!-- Checkbox escondido até ativar editar/excluir -->
						<td class="coluna-selecao" style="display: none;"><input
							type="checkbox" name="idsSelecionados"
							th:value="${produto.idProduto}"></td>

						<td th:text="${produto.idProduto}"></td>

						<td class="nome-produto" th:text="${produto.nome}"></td>

						<td
							th:text="${produto.categoria != null ? produto.categoria : '-'}"></td>

						<td th:text="${produto.marca != null ? produto.marca : '-'}"></td>

						<td th:text="${produto.preco}"></td>


						<td
							th:text="${produto.fornecedor != null ? produto.fornecedor.nomeFantasia : '-'}"></td>

					</tr>

				</tbody>

			</table>

		</form>

	</main>

	<script>
		/*
		 * Guarda o modo atual da tela.
		 * Pode ser editar ou excluir.
		 */
		let modoAtual = "";

		/*
		 * Mostra a coluna de seleção e os botões confirmar/cancelar.
		 */
		function mostrarSelecao() {
			document.querySelectorAll(".coluna-selecao").forEach(
					function(coluna) {
						coluna.style.display = "table-cell";
					});

			document.getElementById("btnConfirmar").style.display = "inline-block";
			document.getElementById("btnCancelar").style.display = "inline-block";
		}

		/*
		 * Ativa modo de edição.
		 * O usuário deve selecionar apenas um produto.
		 */
		function ativarModoEditar() {
			modoAtual = "editar";
			mostrarSelecao();
		}

		/*
		 * Ativa modo de exclusão.
		 * O usuário pode selecionar vários produtos.
		 */
		function ativarModoExcluir() {
			modoAtual = "excluir";
			mostrarSelecao();
		}

		/*
		 * Cancela a seleção e limpa os checkboxes.
		 */
		function cancelarSelecao() {
			modoAtual = "";

			document.querySelectorAll("input[name='idsSelecionados']").forEach(
					function(checkbox) {
						checkbox.checked = false;
					});

			document.querySelectorAll(".coluna-selecao").forEach(
					function(coluna) {
						coluna.style.display = "none";
					});

			document.getElementById("btnConfirmar").style.display = "none";
			document.getElementById("btnCancelar").style.display = "none";
		}

		/*
		 * Confirma a ação escolhida: editar ou excluir.
		 */
		function confirmarAcao() {
			const selecionados = document
					.querySelectorAll("input[name='idsSelecionados']:checked");

			if (selecionados.length === 0) {
				alert("Selecione pelo menos um produto.");
				return;
			}

			if (modoAtual === "editar") {
				if (selecionados.length > 1) {
					alert("Selecione apenas um produto para editar.");
					return;
				}

				const id = selecionados[0].value;
				window.location.href = "/produtos/editar?id=" + id;
			}

			if (modoAtual === "excluir") {
				const confirmar = confirm("Deseja realmente excluir os produtos selecionados?");

				if (!confirmar) {
					return;
				}

				const form = document.getElementById("formSelecao");
				form.action = "/produtos/excluir";
				form.submit();
			}
		}

		/*
		 * Busca em tempo real por nome do produto.
		 */
		document.getElementById("campoPesquisa").addEventListener(
				"input",
				function() {
					const textoBusca = this.value.toLowerCase();
					const linhas = document.querySelectorAll(".linha-produto");

					linhas.forEach(function(linha) {
						const nomeProduto = linha
								.querySelector(".nome-produto").textContent
								.toLowerCase();

						if (nomeProduto.includes(textoBusca)) {
							linha.style.display = "";
						} else {
							linha.style.display = "none";
						}
					});
				});
	</script>
</body>

</html>
