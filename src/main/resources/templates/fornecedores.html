<!DOCTYPE html>
<html lang="pt-br">

<head>

<!-- Importa o CSS principal do sistema -->
<link rel="stylesheet" href="/css/style.css">

<meta charset="UTF-8">
<title>Fornecedores - PetStock</title>
</head>

<body>
	<!-- Insere o cabeçalho padrão -->
	<div th:replace="fragments/header :: header"></div>

	<!-- Conteúdo principal da página -->
	<main class="conteudo">



		<h1>Fornecedores</h1>

		<hr>

		<table border="1">

			<thead>
				<tr>
					<th>ID</th>
					<th>Nome Fantasia</th>
					<th>CNPJ</th>
					<th>Cidade</th>
					<th>Email</th>
				</tr>
			</thead>

			<tbody>

				<tr th:each="fornecedor : ${fornecedores}">

					<td th:text="${fornecedor.idFornecedor}"></td>

					<td th:text="${fornecedor.nomeFantasia}"></td>

					<td th:text="${fornecedor.cnpj}"></td>

					<td
						th:text="${fornecedor.endereco != null ? fornecedor.endereco.cidade : '-'}"></td>

					<td
						th:text="${fornecedor.contato != null ? fornecedor.contato.email : '-'}"></td>

				</tr>

			</tbody>

		</table>



	</main>
</body>

</html>
