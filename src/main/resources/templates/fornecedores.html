<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Fornecedores - PetStock</title>

<!-- CSS global -->
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/header.css">
<link rel="stylesheet" href="/css/fornecedores.css">
</head>

<body>

	<!-- Cabeçalho padrão -->
	<div th:replace="~{fragments/header :: header}"></div>

	<main class="conteudo">

		<p th:if="${erro}" th:text="${erro}" style="color: red;"></p>

		<div class="layout-fornecedores">

			<!-- Área esquerda -->
			<div class="area-tabela">

				<!-- Formulário usado para edição e exclusão -->
				<form id="formSelecao" method="post">

					<!-- Barra de pesquisa -->
					<div class="barra-pesquisa">
						<span class="icone-lupa">🔍</span> <input type="text"
							id="campoPesquisa" placeholder="Buscar...">
					</div>

					<!-- Área com rolagem horizontal e vertical -->
					<div class="tabela-scroll">

						<table>

							<thead>
								<tr>
									<th class="coluna-selecao" style="display: none;">Selecionar</th>
									<th>ID</th>
									<th>Nome Fantasia</th>
									<th>CNPJ</th>
									<th>Contrato Social</th>
									<th>Rua</th>
									<th>Cidade</th>
									<th>Estado</th>
									<th>CEP</th>
									<th>Telefone</th>
									<th>Celular</th>
									<th>E-mail</th>
								</tr>
							</thead>

							<tbody>
							<tbody>

								<tr th:each="fornecedor : ${fornecedores}"
									class="linha-fornecedor">

									<td class="coluna-selecao" style="display: none;"><input
										type="checkbox" name="idsSelecionados"
										th:value="${fornecedor.idFornecedor}"></td>

									<td th:text="${fornecedor.idFornecedor}"></td>

									<td class="nome-fornecedor"
										th:text="${fornecedor.nomeFantasia}"></td>

									<td th:text="${fornecedor.cnpj}"></td>

									<td th:text="${fornecedor.contratoSocial}"></td>

									<td
										th:text="${fornecedor.endereco != null ? fornecedor.endereco.rua : '-'}">
									</td>

									<td
										th:text="${fornecedor.endereco != null ? fornecedor.endereco.cidade : '-'}">
									</td>

									<td
										th:text="${fornecedor.endereco != null ? fornecedor.endereco.estado : '-'}">
									</td>

									<td
										th:text="${fornecedor.endereco != null ? fornecedor.endereco.cep : '-'}">
									</td>

									<td
										th:text="${fornecedor.contato != null ? fornecedor.contato.telefone : '-'}">
									</td>

									<td
										th:text="${fornecedor.contato != null ? fornecedor.contato.celular : '-'}">
									</td>

									<td
										th:text="${fornecedor.contato != null ? fornecedor.contato.email : '-'}">
									</td>

								</tr>

							</tbody>

							</tbody>

						</table>

					</div>

				</form>

			</div>

			<!-- Área direita -->
			<div class="area-botoes">

				<a href="/fornecedores/novo">
					<button type="button" id="btnCadastrar">
						<img src="/img/icone-cadastrar.png" class="icone-botao"> <span>Cadastrar</span>
					</button>
				</a>

				<button type="button" id="btnEditar" onclick="ativarModoEditar()">
					<img src="/img/icone-editar.png" class="icone-botao"> <span>Editar</span>
				</button>

				<button type="button" id="btnExcluir" onclick="ativarModoExcluir()">
					<img src="/img/icone-excluir.png" class="icone-botao"> <span>Excluir</span>
				</button>

				<button type="button" id="btnConfirmar" onclick="confirmarAcao()"
					style="display: none;">Confirmar</button>

				<button type="button" id="btnCancelar" onclick="cancelarSelecao()"
					style="display: none;">Cancelar</button>

			</div>

		</div>

	</main>

	<script>
		let modoAtual = "";

		function mostrarSelecao() {

			document.querySelectorAll(".coluna-selecao").forEach(
					function(coluna) {
						coluna.style.display = "table-cell";
					});

			/* Esconde os botões principais */
			document.getElementById("btnCadastrar").style.display = "none";
			document.getElementById("btnEditar").style.display = "none";
			document.getElementById("btnExcluir").style.display = "none";

			/* Mostra confirmar e cancelar */
			document.getElementById("btnConfirmar").style.display = "";
			document.getElementById("btnCancelar").style.display = "";
		}

		function ativarModoEditar() {
			modoAtual = "editar";
			mostrarSelecao();
		}

		function ativarModoExcluir() {
			modoAtual = "excluir";
			mostrarSelecao();
		}

		function cancelarSelecao() {
			modoAtual = "";

			document.querySelectorAll("input[name='idsSelecionados']").forEach(
					function(checkbox) {
						checkbox.checked = false;
					});

			document.querySelectorAll(".coluna-selecao").forEach(
					function(coluna) {
						coluna.style.display = "none";
					});

			document.getElementById("btnConfirmar").style.display = "none";
			document.getElementById("btnCancelar").style.display = "none";
			
			/* Mostra novamente os botões principais */
			document.getElementById("btnCadastrar").style.display = "";
			document.getElementById("btnEditar").style.display = "";
			document.getElementById("btnExcluir").style.display = "";
		}

		function confirmarAcao() {
			const selecionados = document
					.querySelectorAll("input[name='idsSelecionados']:checked");

			if (selecionados.length === 0) {
				alert("Selecione pelo menos um fornecedor.");
				return;
			}

			if (modoAtual === "editar") {
				if (selecionados.length > 1) {
					alert("Selecione apenas um fornecedor para editar.");
					return;
				}

				const id = selecionados[0].value;
				window.location.href = "/fornecedores/editar?id=" + id;
			}

			if (modoAtual === "excluir") {
				const confirmar = confirm("Deseja realmente excluir os fornecedores selecionados?");

				if (!confirmar) {
					return;
				}

				const form = document.getElementById("formSelecao");

				form.action = "/fornecedores/excluir";
				form.submit();
			}
		}

		document.getElementById("campoPesquisa").addEventListener(
				"input",
				function() {
					const textoBusca = this.value.toLowerCase();
					const linhas = document
							.querySelectorAll(".linha-fornecedor");

					linhas.forEach(function(linha) {
						const nomeFornecedor = linha
								.querySelector(".nome-fornecedor").textContent
								.toLowerCase();

						if (nomeFornecedor.includes(textoBusca)) {
							linha.style.display = "";
						} else {
							linha.style.display = "none";
						}
					});
				});
	</script>

</body>

</html>
