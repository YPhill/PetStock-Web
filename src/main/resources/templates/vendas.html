<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Vendas - PetStock</title>
</head>

<body>

    <h1>Vendas</h1>

    <a href="/">Voltar para início</a>

    <hr>

    <table border="1">

        <thead>
            <tr>
                <th>ID</th>
                <th>Data</th>
                <th>Cliente</th>
                <th>Valor Total</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="venda : ${vendas}">
                <td th:text="${venda.idVenda}"></td>
                <td th:text="${venda.dataVenda}"></td>
                <td th:text="${venda.cliente != null ? venda.cliente.nome : 'Sem cliente'}"></td>
                <td th:text="${venda.valorTotal}"></td>
            </tr>

        </tbody>

    </table>

</body>

</html>
