<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>

<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/header.css">
<link rel="stylesheet" href="/css/vendas.css">
<meta charset="UTF-8">
<title>Vendas - PetStock</title>

</head>

<body>

	<div th:replace="~{fragments/header :: header}"></div>

	<main class="conteudo">

		<div class="layout-vendas">

			<section class="area-form-venda">

				<div class="campo-checkbox">
					<input type="checkbox" id="vendaSemCliente">
					<label>Venda sem cliente</label>
				</div>

				<div>
					<label>Cliente</label>
					<input list="listaClientes" id="clienteSelecionado"
						placeholder="Digite o nome do cliente">

					<datalist id="listaClientes">
						<option th:each="cliente : ${clientes}"
							th:value="${cliente.nome}"
							th:data-id="${cliente.idCliente}">
						</option>
					</datalist>
				</div>

				<div>
					<label>Produto</label>
					<input list="listaProdutos" id="produtoSelecionado"
						placeholder="Digite o nome do produto"
						onchange="preencherProduto()">

					<datalist id="listaProdutos">
						<option th:each="produto : ${produtos}"
							th:value="${produto.nome + ' (' + (produto.estoque != null ? produto.estoque.quantidadeAtual : 0) + ')'}"
							th:data-nome-real="${produto.nome}"
							th:data-id="${produto.idProduto}"
							th:data-preco="${produto.preco}"
							th:data-estoque="${produto.estoque != null ? produto.estoque.quantidadeAtual : 0}"
							th:data-estoque-original="${produto.estoque != null ? produto.estoque.quantidadeAtual : 0}">
						</option>
					</datalist>
				</div>

				<div>
					<label>Preço</label>
					<input type="text" id="precoProduto" readonly>
				</div>

				<div>
					<label>Quantidade</label>
					<input type="number" id="quantidadeProduto" min="1" value="1">
				</div>

				<button type="button" class="btn-adicionar"
					onclick="adicionarAoCarrinho()">

					<img src="/img/icone-adicionar-carrinho.png" class="icone-botao">
					<span>Adicionar ao carrinho</span>

				</button>

				<button type="button" id="btnVoltarRelatorios"
					class="btn-voltar-relatorios"
					onclick="window.location.href='/relatorios'"
					style="display: none;">

					<img src="/img/icone-voltar.png" class="icone-botao">
					<span>Voltar para Relatórios</span>

				</button>

			</section>

			<section class="area-carrinho">

				<div class="cabecalho-carrinho">

					<h2>Itens da venda</h2>

					<div class="data-venda">
						<span>Data</span>
						<input type="date" id="dataVenda">
					</div>

				</div>

				<div class="tabela-scroll-vendas">

					<table>

						<thead>
							<tr>
								<th>Produto</th>
								<th>Quantidade</th>
								<th>Preço Unt</th>
								<th>Subtotal</th>
							</tr>
						</thead>

						<tbody id="tabelaCarrinho">
						</tbody>

					</table>

				</div>

				<div class="area-total">
					<span>Total :</span>
					<strong>R$ <span id="valorTotal">0,00</span></strong>
				</div>

				<div class="botoes-carrinho">

					<button type="button" onclick="finalizarVenda()"
						id="btnFinalizarVenda">

						<img src="/img/icone-finalizar.png" class="icone-botao">
						<span>Finalizar Venda</span>

					</button>

					<button type="button" onclick="editarItemCarrinho()">

						<img src="/img/icone-editar.png" class="icone-botao">
						<span>Editar Item</span>

					</button>

					<button type="button" onclick="removerItemCarrinho()">

						<img src="/img/icone-excluir.png" class="icone-botao">
						<span>Remover Item</span>

					</button>

					<button type="button" onclick="limparCarrinho()">

						<img src="/img/icone-limpar.png" class="icone-botao">
						<span>Limpar</span>

					</button>

				</div>

			</section>

		</div>

		<div id="dadosItensEdicao" style="display: none;"
			th:if="${modoEdicao}">

			<div th:each="item : ${vendaEdicao.itens}" class="item-edicao"
				th:data-id-produto="${item.produto.idProduto}"
				th:data-nome-produto="${item.produto.nome}"
				th:data-preco="${item.precoUnitario}"
				th:data-quantidade="${item.quantidade}"
				th:data-estoque="${item.produto.estoque.quantidadeAtual + item.quantidade}">
			</div>

		</div>

	</main>

	<script th:inline="javascript">

	let carrinho = [];

	let produtoAtual = null;

	let modoEdicao = /*[[${modoEdicao != null ? modoEdicao : false}]]*/ false;

	let idVendaEdicao = /*[[${vendaEdicao != null ? vendaEdicao.idVenda : 0}]]*/ 0;

	let clienteEdicao = /*[[${vendaEdicao != null && vendaEdicao.cliente != null ? vendaEdicao.cliente.nome : ''}]]*/ "";

	function formatarMoeda(valor) {

		return Number(valor)
			.toFixed(2)
			.replace(".", ",");
	}

	function atualizarListaProdutos() {

		const opcoes = document.querySelectorAll("#listaProdutos option");

		opcoes.forEach(function(opcao) {

			const idProduto = Number(opcao.getAttribute("data-id"));
			const nomeReal = opcao.getAttribute("data-nome-real");
			const estoqueOriginal = Number(opcao.getAttribute("data-estoque-original"));

			let quantidadeNoCarrinho = 0;

			carrinho.forEach(function(item) {

				if (item.idProduto === idProduto) {
					quantidadeNoCarrinho += item.quantidade;
				}
			});

			const estoqueDisponivel = estoqueOriginal - quantidadeNoCarrinho;

			opcao.value = nomeReal + " (" + estoqueDisponivel + ")";

			opcao.setAttribute("data-estoque", estoqueDisponivel);
		});
	}

	function preencherProduto() {

		const nomeDigitado = document.getElementById("produtoSelecionado").value;
		const opcoes = document.querySelectorAll("#listaProdutos option");

		produtoAtual = null;

		opcoes.forEach(function(opcao) {

			if (opcao.value === nomeDigitado) {

				produtoAtual = {
					id: Number(opcao.getAttribute("data-id")),
					nome: opcao.getAttribute("data-nome-real"),
					preco: Number(opcao.getAttribute("data-preco")),
					estoque: Number(opcao.getAttribute("data-estoque"))
				};
			}
		});

		if (produtoAtual != null) {
			document.getElementById("precoProduto").value =
				formatarMoeda(produtoAtual.preco);
		}
	}

	function adicionarAoCarrinho() {

		if (produtoAtual == null) {
			alert("Selecione um produto válido.");
			return;
		}

		const quantidade = Number(document.getElementById("quantidadeProduto").value);

		if (quantidade <= 0) {
			alert("Informe uma quantidade válida.");
			return;
		}

		const itemExistente =
			carrinho.find(item => item.idProduto === produtoAtual.id);

		const quantidadeJaNoCarrinho =
			itemExistente ? itemExistente.quantidade : 0;

		if (quantidadeJaNoCarrinho + quantidade > produtoAtual.estoque) {
			alert("Estoque insuficiente. Disponível: " + produtoAtual.estoque);
			return;
		}

		if (itemExistente) {

			itemExistente.quantidade += quantidade;
			itemExistente.subtotal =
				itemExistente.quantidade * itemExistente.preco;

		} else {

			carrinho.push({
				idProduto: produtoAtual.id,
				nome: produtoAtual.nome,
				preco: produtoAtual.preco,
				estoque: produtoAtual.estoque,
				quantidade: quantidade,
				subtotal: produtoAtual.preco * quantidade
			});
		}

		atualizarCarrinho();

		document.getElementById("produtoSelecionado").value = "";
		document.getElementById("precoProduto").value = "";
		document.getElementById("quantidadeProduto").value = 1;

		produtoAtual = null;

		atualizarListaProdutos();
	}

	function atualizarCarrinho() {

		const tabela = document.getElementById("tabelaCarrinho");

		tabela.innerHTML = "";

		let total = 0;

		carrinho.forEach(function(item, index) {

			total += item.subtotal;

			tabela.innerHTML += `
				<tr>
					<td>
						<input type="radio" name="itemCarrinho" value="${index}">
						${item.nome}
					</td>
					<td>${item.quantidade}</td>
					<td>R$ ${formatarMoeda(item.preco)}</td>
					<td>R$ ${formatarMoeda(item.subtotal)}</td>
				</tr>
			`;
		});

		document.getElementById("valorTotal").textContent =
			formatarMoeda(total);
	}

	function limparCarrinho() {

		carrinho = [];

		atualizarCarrinho();

		atualizarListaProdutos();
	}

	function removerItemCarrinho() {

		const selecionado =
			document.querySelector("input[name='itemCarrinho']:checked");

		if (!selecionado) {
			alert("Selecione um item do carrinho.");
			return;
		}

		carrinho.splice(Number(selecionado.value), 1);

		atualizarCarrinho();

		atualizarListaProdutos();
	}

	function editarItemCarrinho() {

		const selecionado =
			document.querySelector("input[name='itemCarrinho']:checked");

		if (!selecionado) {
			alert("Selecione um item do carrinho.");
			return;
		}

		const indice = Number(selecionado.value);

		const item = carrinho[indice];

		const novaQuantidade =
			Number(prompt("Nova quantidade para " + item.nome + ":", item.quantidade));

		if (novaQuantidade <= 0) {
			alert("Quantidade inválida.");
			return;
		}

		if (novaQuantidade > item.estoque) {
			alert("Estoque insuficiente. Disponível: " + item.estoque);
			return;
		}

		item.quantidade = novaQuantidade;

		item.subtotal = item.quantidade * item.preco;

		atualizarCarrinho();

		atualizarListaProdutos();
	}

	document.getElementById("vendaSemCliente").addEventListener("change", function() {

		const campoCliente = document.getElementById("clienteSelecionado");

		if (this.checked) {

			campoCliente.value = "";
			campoCliente.disabled = true;

		} else {

			campoCliente.disabled = false;
		}
	});

	function finalizarVenda() {

		if (carrinho.length === 0) {
			alert("Adicione pelo menos um produto ao carrinho.");
			return;
		}

		const vendaSemCliente =
			document.getElementById("vendaSemCliente").checked;

		let clienteId = null;

		if (!vendaSemCliente) {

			const nomeCliente =
				document.getElementById("clienteSelecionado").value;

			const clientes =
				document.querySelectorAll("#listaClientes option");

			clientes.forEach(function(cliente) {

				if (cliente.value === nomeCliente) {
					clienteId = Number(cliente.getAttribute("data-id"));
				}
			});

			if (clienteId === null) {
				alert("Selecione um cliente válido ou marque venda sem cliente.");
				return;
			}
		}

		const venda = {
			clienteId: clienteId,
			itens: carrinho.map(function(item) {
				return {
					produtoId: item.idProduto,
					quantidade: item.quantidade
				};
			})
		};

		const urlVenda =
			modoEdicao
				? "/vendas/atualizar?id=" + idVendaEdicao
				: "/vendas/finalizar";

		fetch(urlVenda, {
			method: "POST",
			headers: {
				"Content-Type": "application/json"
			},
			body: JSON.stringify(venda)
		})
		.then(function(response) {

			return response.text().then(function(mensagem) {

				if (!response.ok) {
					throw new Error(mensagem);
				}

				return mensagem;
			});
		})
		.then(function(mensagem) {

			alert(mensagem);

			limparCarrinho();

			document.getElementById("clienteSelecionado").value = "";
			document.getElementById("produtoSelecionado").value = "";
			document.getElementById("precoProduto").value = "";
			document.getElementById("quantidadeProduto").value = 1;
			document.getElementById("vendaSemCliente").checked = false;

			if (modoEdicao) {
				window.location.href = "/relatorios";
			} else {
				window.location.reload();
			}
		})
		.catch(function(erro) {
			alert("Erro ao finalizar venda: " + erro.message);
		});
	}

	const hoje = new Date();

	const dataAtual =
		hoje.getFullYear() + "-" +
		String(hoje.getMonth() + 1).padStart(2, "0") + "-" +
		String(hoje.getDate()).padStart(2, "0");

	document.getElementById("dataVenda").value = dataAtual;

	document.getElementById("dataVenda").readOnly = true;

	const checkboxSemCliente =
		document.getElementById("vendaSemCliente");

	const campoCliente =
		document.getElementById("clienteSelecionado");

	checkboxSemCliente.addEventListener("change", function() {

		if (this.checked) {

			campoCliente.removeAttribute("required");

			campoCliente.value = "";

		} else {

			campoCliente.setAttribute("required", "required");
		}
	});

	if (modoEdicao) {

		document.getElementById("btnFinalizarVenda").innerHTML = `
			<img src="/img/icone-finalizar.png" class="icone-botao">
			<span>Salvar Alterações</span>
		`;

		document.getElementById("btnVoltarRelatorios").style.display = "grid";

		if (clienteEdicao !== "") {

			document.getElementById("clienteSelecionado").value = clienteEdicao;

		} else {

			document.getElementById("vendaSemCliente").checked = true;
			document.getElementById("clienteSelecionado").disabled = true;
		}

		document.querySelectorAll(".item-edicao").forEach(function(item) {

			const idProduto =
				Number(item.getAttribute("data-id-produto"));

			const nome =
				item.getAttribute("data-nome-produto");

			const preco =
				Number(item.getAttribute("data-preco"));

			const quantidade =
				Number(item.getAttribute("data-quantidade"));

			const estoque =
				Number(item.getAttribute("data-estoque"));

			carrinho.push({
				idProduto: idProduto,
				nome: nome,
				preco: preco,
				estoque: estoque,
				quantidade: quantidade,
				subtotal: preco * quantidade
			});
		});

		carrinho.forEach(function(itemCarrinho) {

			const opcoes =
				document.querySelectorAll("#listaProdutos option");

			opcoes.forEach(function(opcao) {

				const idProduto =
					Number(opcao.getAttribute("data-id"));

				if (idProduto === itemCarrinho.idProduto) {

					opcao.setAttribute(
						"data-estoque-original",
						itemCarrinho.estoque
					);

					opcao.setAttribute(
						"data-estoque",
						itemCarrinho.estoque
					);
				}
			});
		});

		atualizarCarrinho();

		atualizarListaProdutos();
	}

	</script>

</body>

</html>
