<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Novo Cliente - PetStock</title>

<!-- CSS global -->
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/header.css">
<link rel="stylesheet" href="/css/formularios.css">
</head>

<body>

	<!-- Cabeçalho padrão -->
	<div th:replace="~{fragments/header :: header}"></div>

	<main class="conteudo">

		<h1>Cadastrar Cliente</h1>

		<hr>

		<!-- Formulário -->
		<form th:action="@{/clientes/salvar}" th:object="${cliente}"
			method="post">

			<!-- ID do cliente, usado quando for edição -->
			<input type="hidden" th:field="*{idCliente}">

			<!-- ID do endereço, usado para não criar endereço duplicado na edição -->
			<input type="hidden" th:field="*{endereco.idEndereco}">

			<!-- ID do contato, usado para não criar contato duplicado na edição -->
			<input type="hidden" th:field="*{contato.idContato}">

			<!-- Guarda a tela de origem do cadastro -->
			<input type="hidden" name="origem" th:value="${origem}">

			
			
			<!-- Divisão do forms em dois -->
			<div class="grid-formulario">
			
			
			<!-- Nome -->
			<!-- Nome -->
<div>
	<label>Nome:</label>

	<input type="text"
		th:field="*{nome}"
		placeholder="Digite o nome do cliente"
		required>
</div>

			

			<!-- Rua -->
			<!-- Rua -->
<div>
	<label>Rua:</label>

	<input type="text"
		th:field="*{endereco.rua}"
		placeholder="Digite a rua"
		required>
</div>

		

			<!-- Cidade -->
			<!-- Cidade -->
<div>
	<label>Cidade:</label>

	<input type="text"
		th:field="*{endereco.cidade}"
		placeholder="Digite a cidade"
		required>
</div>

			

			<!-- Estado -->
			<div>
	<label>Estado:</label> <br>

	<select th:field="*{endereco.estado}" required>

		<option value="">Selecione um estado</option>

		<option value="AC">Acre</option>
		<option value="AL">Alagoas</option>
		<option value="AP">Amapá</option>
		<option value="AM">Amazonas</option>
		<option value="BA">Bahia</option>
		<option value="CE">Ceará</option>
		<option value="DF">Distrito Federal</option>
		<option value="ES">Espírito Santo</option>
		<option value="GO">Goiás</option>
		<option value="MA">Maranhão</option>
		<option value="MT">Mato Grosso</option>
		<option value="MS">Mato Grosso do Sul</option>
		<option value="MG">Minas Gerais</option>
		<option value="PA">Pará</option>
		<option value="PB">Paraíba</option>
		<option value="PR">Paraná</option>
		<option value="PE">Pernambuco</option>
		<option value="PI">Piauí</option>
		<option value="RJ">Rio de Janeiro</option>
		<option value="RN">Rio Grande do Norte</option>
		<option value="RS">Rio Grande do Sul</option>
		<option value="RO">Rondônia</option>
		<option value="RR">Roraima</option>
		<option value="SC">Santa Catarina</option>
		<option value="SP">São Paulo</option>
		<option value="SE">Sergipe</option>
		<option value="TO">Tocantins</option>

	</select>
</div>

			

			<!-- CEP -->
			<div>
	<label>CEP:</label>
	<input type="text"
		th:field="*{endereco.cep}"
		placeholder="Deve conter 8 números"
		required
		minlength="8"
		maxlength="8"
		pattern="[0-9]{8}"
		title="O CEP deve conter exatamente 8 números">
</div>

			

			<!-- Celular -->
			<div>
	<label>Celular:</label>
	<input type="text"
		th:field="*{contato.celular}"
		placeholder="Deve conter entre 10 e 11 números"
		required
		minlength="10"
		maxlength="11"
		pattern="[0-9]{10,11}"
		title="O celular deve conter entre 10 e 11 números">
</div>

			

			<!-- Email -->
			<div>
				<label>Email:</label> <br> <input type="email"
					th:field="*{contato.email}" placeholder="Deve conter @">
			</div>
			</div>

			

			<!-- Botões  exibidos quando vem da tela de cadastro -->
			<div class="grupo-botoes">
				<button type="button" class="btn-voltar" onclick="window.location.href='/clientes'">Voltar</button>
				<button type="submit">Salvar Cliente</button>	
			</div>

			<!-- Botão exibido apenas quando o cadastro veio da tela de vendas -->
			<a th:if="${origem == 'vendas'}" href="/vendas">
				<button type="button">Voltar para Venda</button>
			</a>

		</form>

	</main>

</body>

</html>
