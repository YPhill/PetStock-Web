<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>

<!-- Importa o CSS principal do sistema -->
<link rel="stylesheet" href="/css/style.css">
<meta charset="UTF-8">
<title>Relatórios - PetStock</title>
</head>

<body>
	<!-- Insere o cabeçalho padrão -->
	<div th:replace="~{fragments/header :: header}"></div>

	<!-- Conteúdo principal da página -->
	<main class="conteudo">

		<h1>Relatórios</h1>

		<!-- Filtros do relatório de vendas -->
		<section>
			<label>Data inicial:</label> <input type="date" id="dataInicial">

			<label>Data final:</label> <input type="date" id="dataFinal">

			<label>Cliente:</label> <input list="listaClientes"
				id="clienteFiltro" placeholder="Digite o nome do cliente">

			<datalist id="listaClientes">
				<option th:each="cliente : ${clientes}" th:value="${cliente.nome}">
				</option>
			</datalist>

			<button type="button" onclick="filtrarVendas()">Buscar</button>
			<button type="button" onclick="limparFiltros()">Limpar</button>
		</section>


		<!-- Tabela principal com as vendas realizadas -->
		<section>
			<h2>Vendas realizadas</h2>

			<table border="1">
				<thead>
					<tr>
						<th>Selecionar</th>
						<th>ID</th>
						<th>Data</th>
						<th>Cliente</th>
						<th>Total</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="venda : ${vendas}" class="linha-venda"
						th:data-id="${venda.idVenda}" th:data-data="${venda.dataVenda}"
						th:data-cliente="${venda.cliente != null ? venda.cliente.nome : 'Sem cliente'}"
						th:data-total="${venda.valorTotal}">

						<td><input type="radio" name="vendaSelecionada"
							onchange="selecionarVenda(this.closest('tr'))"></td>
						<td th:text="${venda.idVenda}"></td>
						<td th:text="${venda.dataVenda}"></td>
						<td
							th:text="${venda.cliente != null ? venda.cliente.nome : 'Sem cliente'}"></td>
						<td th:text="${venda.valorTotal}"></td>
					</tr>
				</tbody>
			</table>
		</section>

		<!-- Dados escondidos dos itens de cada venda -->
		<div style="display: none;">

			<div th:each="venda : ${vendas}"
				th:id="'itens-venda-' + ${venda.idVenda}">

				<div th:each="item : ${venda.itens}" class="item-venda"
					th:data-produto="${item.produto.nome}"
					th:data-quantidade="${item.quantidade}"
					th:data-preco="${item.precoUnitario}"
					th:data-subtotal="${item.precoUnitario * item.quantidade}"></div>

			</div>

		</div>

		<!-- Detalhes da venda selecionada -->
		<section>
			<h2>Itens da venda selecionada</h2>

			<table border="1">
				<thead>
					<tr>
						<th>Produto</th>
						<th>Quantidade</th>
						<th>Preço Unitário</th>
						<th>Subtotal</th>
					</tr>
				</thead>

				<tbody id="tabelaItens">
					<tr>
						<td colspan="4">Selecione uma venda acima.</td>
					</tr>
				</tbody>
			</table>

			<h3>
				Total da venda: R$ <span id="totalVendaSelecionada">0.00</span>
			</h3>

			<button type="button" onclick="excluirVendaSelecionada()">
				Excluir Venda</button>
		</section>


		<hr>

	</main>

	<script>
		let vendaSelecionadaId = null;

		function selecionarVenda(linha) {
			vendaSelecionadaId = linha.getAttribute("data-id");

			document.querySelectorAll(".linha-venda").forEach(function(item) {
				item.style.backgroundColor = "";
			});

			linha.style.backgroundColor = "#e8d6c3";

			document.getElementById("totalVendaSelecionada").textContent = Number(
					linha.getAttribute("data-total")).toFixed(2);

			carregarItensVenda(vendaSelecionadaId);
		}
		
		/*
		 * Carrega os itens da venda selecionada na tabela inferior.
		 */
		function carregarItensVenda(idVenda) {

			const tabelaItens = document.getElementById("tabelaItens");
			const containerItens = document.getElementById("itens-venda-" + idVenda);

			tabelaItens.innerHTML = "";

			if (!containerItens) {
				tabelaItens.innerHTML = "<tr><td colspan='4'>Nenhum item encontrado.</td></tr>";
				return;
			}

			const itens = containerItens.querySelectorAll(".item-venda");

			itens.forEach(function(item) {

				const produto = item.getAttribute("data-produto");
				const quantidade = item.getAttribute("data-quantidade");
				const preco = Number(item.getAttribute("data-preco")).toFixed(2);
				const subtotal = Number(item.getAttribute("data-subtotal")).toFixed(2);

				tabelaItens.innerHTML += `
					<tr>
						<td>${produto}</td>
						<td>${quantidade}</td>
						<td>R$ ${preco}</td>
						<td>R$ ${subtotal}</td>
					</tr>
				`;
			});
		}

		/*
		 * Filtra a tabela de vendas por data inicial, data final e cliente.
		 */
		function filtrarVendas() {

			const dataInicial = document.getElementById("dataInicial").value;
			const dataFinal = document.getElementById("dataFinal").value;
			const clienteFiltro = document.getElementById("clienteFiltro").value
					.toLowerCase();

			const linhas = document.querySelectorAll(".linha-venda");

			linhas.forEach(function(linha) {

				const dataVenda = linha.getAttribute("data-data");
				const clienteVenda = linha.getAttribute("data-cliente")
						.toLowerCase();

				let mostrar = true;

				/*
				 * Se tiver data inicial, oculta vendas anteriores.
				 */
				if (dataInicial !== "" && dataVenda < dataInicial) {
					mostrar = false;
				}

				/*
				 * Se tiver data final, oculta vendas posteriores.
				 */
				if (dataFinal !== "" && dataVenda > dataFinal) {
					mostrar = false;
				}

				/*
				 * Se tiver cliente informado, filtra pelo nome.
				 */
				if (clienteFiltro !== ""
						&& !clienteVenda.includes(clienteFiltro)) {
					mostrar = false;
				}

				if (mostrar) {
					linha.style.display = "";
				} else {
					linha.style.display = "none";
				}
			});
		}

		function limparFiltros() {
			document.getElementById("dataInicial").value = "";
			document.getElementById("dataFinal").value = "";
			document.getElementById("clienteFiltro").value = "";

			document.querySelectorAll(".linha-venda").forEach(function(linha) {
				linha.style.display = "";
			});
		}

		/*
		 * Exclui a venda selecionada.
		 * Não devolve os itens ao estoque neste momento.
		 */
		function excluirVendaSelecionada() {

			if (vendaSelecionadaId == null) {
				alert("Selecione uma venda.");
				return;
			}

			const confirmar = confirm("Deseja realmente excluir esta venda?");

			if (!confirmar) {
				return;
			}

			window.location.href = "/relatorios/excluir?id=" + vendaSelecionadaId;
		}
	</script>
</body>

</html>
