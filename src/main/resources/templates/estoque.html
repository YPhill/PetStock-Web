<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Estoque - PetStock</title>

<!-- CSS global -->
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/header.css">
<link rel="stylesheet" href="/css/estoque.css">
</head>

<body>

	<!-- Cabeçalho padrão -->
	<div th:replace="~{fragments/header :: header}"></div>

	<main class="conteudo">

		<p th:if="${erro}" th:text="${erro}" style="color: red;"></p>

		<div class="layout-estoque">

			<!-- Área esquerda -->
			<div class="area-tabela">

				<!-- Barra de pesquisa -->
				<div class="barra-pesquisa">
					<span class="icone-lupa">🔍</span>

					<input type="text" id="campoPesquisa" placeholder="Buscar...">
				</div>

				<!-- Área com rolagem horizontal e vertical -->
				<div class="tabela-scroll">

					<table>

						<thead>
							<tr>
								<th>Selecionar</th>
								<th>ID Produto</th>
								<th>Produto</th>
								<th>Categoria</th>
								<th>Marca</th>
								<th>Quantidade Atual</th>
							</tr>
						</thead>

						<tbody>

							<tr th:each="estoque : ${estoques}" class="linha-estoque">

								<!-- Seleciona apenas um produto para movimentar o estoque -->
								<td>
									<input type="radio" name="produtoSelecionado"
										th:value="${estoque.produto.idProduto}"
										th:data-nome="${estoque.produto.nome}">
								</td>

								<td th:text="${estoque.produto.idProduto}"></td>

								<td class="nome-produto" th:text="${estoque.produto.nome}"></td>

								<td
									th:text="${estoque.produto.categoria != null ? estoque.produto.categoria : '-'}">
								</td>

								<td
									th:text="${estoque.produto.marca != null ? estoque.produto.marca : '-'}">
								</td>

								<td th:text="${estoque.quantidadeAtual}"></td>



							</tr>

						</tbody>

					</table>

				</div>

			</div>

			<!-- Área direita -->
			<div class="area-botoes">

				<button type="button" id="btnEntrada"
					onclick="prepararMovimento('entrada')">
					<img src="/img/icone-add-estoque.png" class="icone-botao">
					<span>Entrada</span>
				</button>

				<button type="button" id="btnAjustar"
					onclick="prepararMovimento('ajustar')">
					<img src="/img/icone-editar.png" class="icone-botao">
					<span>Ajustar</span>
				</button>

				<button type="button" id="btnSaida"
					onclick="prepararMovimento('saida')">
					<img src="/img/icone-excluir.png" class="icone-botao">
					<span>Saída</span>
				</button>

			</div>

		</div>

	</main>

	<script>
		/*
		 * Busca em tempo real por nome do produto.
		 * Conforme o usuário digita, a tabela de estoque é filtrada.
		 */
		document.getElementById("campoPesquisa").addEventListener("input", function() {
			const textoBusca = this.value.toLowerCase();
			const linhas = document.querySelectorAll(".linha-estoque");

			linhas.forEach(function(linha) {
				const nomeProduto = linha.querySelector(".nome-produto").textContent.toLowerCase();

				if (nomeProduto.includes(textoBusca)) {
					linha.style.display = "";
				} else {
					linha.style.display = "none";
				}
			});
		});

		/*
		 * Prepara a movimentação do estoque.
		 * O usuário seleciona um produto na tabela e escolhe Entrada, Saída ou Ajustar.
		 */
		function prepararMovimento(acao) {

			// Busca o produto selecionado na tabela
			const selecionado = document.querySelector("input[name='produtoSelecionado']:checked");

			if (!selecionado) {
				alert("Selecione um produto na tabela.");
				return;
			}

			// Pega o ID e o nome do produto selecionado
			const idProduto = selecionado.value;
			const nomeProduto = selecionado.getAttribute("data-nome");

			let mensagem = "";

			if (acao === "entrada") {
				mensagem = "Quantas unidades chegaram para o produto " + nomeProduto + "?";
			}

			if (acao === "saida") {
				mensagem = "Quantas unidades saíram do produto " + nomeProduto + "?";
			}

			if (acao === "ajustar") {
				mensagem = "Quantas unidades existem atualmente do produto " + nomeProduto + "?";
			}

			// Abre uma caixa de mensagem para o usuário informar a quantidade
			const quantidade = prompt(mensagem);

			if (quantidade === null) {
				return;
			}

			if (quantidade.trim() === "" || Number(quantidade) < 0) {
				alert("Informe uma quantidade válida.");
				return;
			}

			// Cria um formulário temporário para enviar ao Controller
			const form = document.createElement("form");
			form.method = "post";
			form.action = "/estoque/" + acao;

			// Campo escondido com o ID do produto
			const inputId = document.createElement("input");
			inputId.type = "hidden";
			inputId.name = "idProduto";
			inputId.value = idProduto;

			// Campo escondido com a quantidade informada
			const inputQuantidade = document.createElement("input");
			inputQuantidade.type = "hidden";
			inputQuantidade.name = "quantidade";
			inputQuantidade.value = quantidade;

			form.appendChild(inputId);
			form.appendChild(inputQuantidade);

			document.body.appendChild(form);
			form.submit();
		}
	</script>

</body>

</html>
