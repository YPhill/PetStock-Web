<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Clientes - PetStock</title>

<!-- CSS global -->
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/header.css">
<link rel="stylesheet" href="/css/clientes.css">
</head>

<body>

	<!-- Cabeçalho padrão -->
	<div th:replace="~{fragments/header :: header}"></div>

	<main class="conteudo">

		<p th:if="${erro}" th:text="${erro}" style="color: red;"></p>

		<div class="layout-clientes">

			<!-- Área esquerda -->
			<div class="area-tabela">

				<!-- Formulário usado para edição e exclusão -->
				<form id="formSelecao" method="post">

					<!-- Barra de pesquisa -->
					<div class="barra-pesquisa">
						<span class="icone-lupa">🔍</span> <input type="text"
							id="campoPesquisa" placeholder="Buscar...">
					</div>

					<!-- Área com rolagem horizontal -->
					<!-- Área com rolagem horizontal e vertical -->
					<div class="tabela-scroll">

						<table>

							<thead>
								<tr>
									<th class="coluna-selecao" style="display: none;">Selecionar</th>
									<th>ID</th>
									<th>Nome</th>
									<th>Rua</th>
									<th>Cidade</th>
									<th>Estado</th>
									<th>CEP</th>
									<th>Celular</th>
									<th>E-mail</th>
								</tr>
							</thead>

							<tbody>

								<tr th:each="cliente : ${clientes}" class="linha-cliente">

									<!-- Checkbox escondido até ativar editar/excluir -->
									<td class="coluna-selecao" style="display: none;"><input
										type="checkbox" name="idsSelecionados"
										th:value="${cliente.idCliente}"></td>

									<td th:text="${cliente.idCliente}"></td>

									<td class="nome-cliente" th:text="${cliente.nome}"></td>

									<td
										th:text="${cliente.endereco != null ? cliente.endereco.rua : '-'}">
									</td>

									<td
										th:text="${cliente.endereco != null ? cliente.endereco.cidade : '-'}">
									</td>

									<td
										th:text="${cliente.endereco != null ? cliente.endereco.estado : '-'}">
									</td>

									<td
										th:text="${cliente.endereco != null ? cliente.endereco.cep : '-'}">
									</td>

									<td
										th:text="${cliente.contato != null ? cliente.contato.celular : '-'}">
									</td>

									<td
										th:text="${cliente.contato != null ? cliente.contato.email : '-'}">
									</td>

								</tr>

							</tbody>

						</table>

					</div>

				</form>

			</div>

			<!-- Área direita -->
			<div class="area-botoes">

				<a href="/clientes/novo">
					<button type="button" id="btnCadastrar">
						<img src="/img/icone-add-cliente.png" class="icone-botao"> <span>Cadastrar
						</span>
					</button>
				</a>

				<button type="button" id="btnEditar" onclick="ativarModoEditar()">
					<img src="/img/icone-editar.png" class="icone-botao"> <span>
						Editar </span>
				</button>

				<button type="button" id="btnExcluir" onclick="ativarModoExcluir()">
					<img src="/img/icone-excluir.png" class="icone-botao">
					<span> Excluir </span>
				</button>

				<button type="button" id="btnConfirmar" onclick="confirmarAcao()"
					style="display: none;">

					<img src="/img/icone-finalizado.png" class="icone-botao"> <span>Confirmar</span>

				</button>

				<button type="button" id="btnCancelar" onclick="cancelarSelecao()"
					style="display: none;">

					<img src="/img/icone-x.png" class="icone-botao"> <span>Cancelar</span>

				</button>

			</div>

		</div>

	</main>

	<script>
		let modoAtual = "";

		function mostrarSelecao() {

			document.querySelectorAll(".coluna-selecao").forEach(
					function(coluna) {
						coluna.style.display = "table-cell";
					});

			/* Esconde os botões principais */
			document.getElementById("btnCadastrar").style.display = "none";
			document.getElementById("btnEditar").style.display = "none";
			document.getElementById("btnExcluir").style.display = "none";

			/* Mostra confirmar e cancelar */
			document.getElementById("btnConfirmar").style.display = "grid";
			document.getElementById("btnCancelar").style.display = "grid";
		}

		function ativarModoEditar() {
			modoAtual = "editar";
			mostrarSelecao();
		}

		function ativarModoExcluir() {
			modoAtual = "excluir";
			mostrarSelecao();
		}

		function cancelarSelecao() {
			modoAtual = "";

			document.querySelectorAll("input[name='idsSelecionados']").forEach(
					function(checkbox) {
						checkbox.checked = false;
					});

			document.querySelectorAll(".coluna-selecao").forEach(
					function(coluna) {
						coluna.style.display = "none";
					});

			document.getElementById("btnConfirmar").style.display = "none";
			document.getElementById("btnCancelar").style.display = "none";

			/* Mostra novamente os botões principais */
			document.getElementById("btnCadastrar").style.display = "";
			document.getElementById("btnEditar").style.display = "";
			document.getElementById("btnExcluir").style.display = "";
		}

		function confirmarAcao() {
			const selecionados = document
					.querySelectorAll("input[name='idsSelecionados']:checked");

			if (selecionados.length === 0) {
				alert("Selecione pelo menos um cliente.");
				return;
			}

			if (modoAtual === "editar") {
				if (selecionados.length > 1) {
					alert("Para editar, selecione apenas um cliente.");
					return;
				}

				const id = selecionados[0].value;
				window.location.href = "/clientes/editar?id=" + id;
			}

			if (modoAtual === "excluir") {
				const confirmar = confirm("Deseja realmente excluir os clientes selecionados?");

				if (!confirmar) {
					return;
				}

				const form = document.getElementById("formSelecao");

				form.action = "/clientes/excluir";
				form.submit();
			}
		}

		document.getElementById("campoPesquisa").addEventListener(
				"input",
				function() {
					const textoBusca = this.value.toLowerCase();
					const linhas = document.querySelectorAll(".linha-cliente");

					linhas.forEach(function(linha) {
						const nomeCliente = linha
								.querySelector(".nome-cliente").textContent
								.toLowerCase();

						if (nomeCliente.includes(textoBusca)) {
							linha.style.display = "";
						} else {
							linha.style.display = "none";
						}
					});
				});
	</script>

</body>

</html>
